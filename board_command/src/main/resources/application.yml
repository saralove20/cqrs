server:
  port: 8081

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10     # 유레카 서버에 내 주소를 갱신하는 주기
    lease-expiration-duration-in-seconds: 30  # 설정한 주소의 만료 시간 (30동안 소식이 없으면 만료)
    prefer-ip-address: true                   # 현재 서비스를 찾을 때 호스트 네임 대신 IP 주소를 사용
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka  # 유레카 서버의 주소
    register-with-eureka: true  # 현재 자신의 IP주소를 유레카에 등록
    fetch-registry: true        # 유레카에 등록된 주소들을 받아오는 것

spring:
  application:
    name: board-command

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      com.example.board_command: debug
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: trace