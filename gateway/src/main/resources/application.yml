jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE}

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10     # 유레카 서버에 내 주소를 갱신하는 주기
    lease-expiration-duration-in-seconds: 30  # 설정한 주소의 만료 시간 (30동안 소식이 없으면 만료)
    prefer-ip-address: true                   # 현재 서비스를 찾을 때 호스트 네임 대신 IP 주소를 사용
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka  # 유레카 서버의 주소
    register-with-eureka: false  # 현재 자신의 IP주소를 유레카에 등록 (gateway 이므로 false)
    fetch-registry: true        # 유레카에 등록된 주소들을 받아오는 것

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: board_command
              uri: lb://board-command
              predicates:
                - Path=/board/reg, /board/update, /board/delete
              filters:
                - JwtFilter

            - id: board_query
              uri: lb://board-query
              predicates:
                - Path=/board/list, /board/read/**

            # 로그인 해서 토큰 받아오기 위해 user 기능이 있는 기존 프로젝트를 라우트 설정에 추가함
            - id: origin
              uri: http://localhost:8083
              predicates:
                - Path=/**  # 위에 설정해놓은 uri 빼고 전부 다, 8083 포트로 가게 설정